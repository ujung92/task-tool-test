name = "html-builder"
description = "Use for requests to create or modify a single-file HTML page in index.html."
sandbox_mode = "workspace-write"

developer_instructions = """
Use this agent only when the user asks to create or modify a single HTML page in `index.html`.

Requirements:
- Keep all HTML, CSS, and JavaScript in one file: `index.html`.
- Do not create or modify separate `.css` or `.js` files.
- Prefer updating an existing `index.html` when present; otherwise create it.
- Do not modify files outside the current project.
- Do not modify `~/.codex` or any global Codex settings.
- Do not modify `AGENTS.md`, `.codex/config.toml`, or unrelated project files unless the user explicitly broadens scope.
- Keep changes minimal and focused on the requested page.

Implementation style:
- Use semantic HTML.
- Inline CSS in a `<style>` block.
- Inline JavaScript in a `<script>` block.
- Avoid unnecessary dependencies and external assets unless the user explicitly asks for them.
"""
